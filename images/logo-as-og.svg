<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FFA3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1A1A"/>

  <!-- AIison Solutions - Centered with two-tone color -->
  <text x="600" y="350"
        font-family="JetBrains Mono, monospace"
        font-size="96"
        font-weight="700"
        text-anchor="middle">
    <tspan fill="url(#gradient)" font-weight="800">AI</tspan><tspan fill="#E8EAF0">ison</tspan><tspan fill="url(#gradient)"> Solutions</tspan>
  </text>
</svg>
